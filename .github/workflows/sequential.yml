name: Sequential version

on:
  push:
    branches:
      - develop
      - master

  pull_request:
    branches:
      - develop

  # For development phase
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        version: [22.04, 24.04]
        cfg:
        - {opts: --enable-debug}
        - {opts: --enable-optim --enable-generic}

    name: Ubuntu ${{ matrix.version }} with ${{ matrix.cfg.opts }} - ${{ github.workflow }}
    runs-on: ubuntu-${{ matrix.version }}

    steps:
      - uses: actions/checkout@main

      - name: Install
        run: |
          sudo apt update
          sudo apt install gcc g++ gfortran m4 patch \
            git libblas-dev liblapack-dev libhdf5-dev libgsl-dev flex bison \
            wget cmake autoconf automake autotools-dev

      - name: Configure
        run: |
          autoreconf -i
          ./configure --enable-download --without-mpi ${{ matrix.cfg.opts }} --prefix="${HOME}/freefem"

      - name: Build
        run: make -j 4

      - name: Check
        run: |
          make check -i
          ./etc/actions/failed_tests_logs.sh

      - name: Install
        run: make install

  macos:
    strategy:
      fail-fast: false
      matrix:
        version: [14, 15, 26]
        cfg:
        - {opts: --enable-debug}
        - {opts: --enable-optim --enable-generic}

    name: macOS ${{ matrix.version }} with ${{ matrix.cfg.opts }} - ${{ github.workflow }}
    runs-on: macos-${{ matrix.version }}

    steps:
      - uses: actions/checkout@main

      - name: Install
        run: brew install m4 flex bison suitesparse autoconf automake

      - name: Symlink GCC & Fortran
        run: ./etc/actions/macos/link_fortran.sh "$(uname -p)"

      - name: Configure
        run: |
          autoreconf -i
          ./configure --enable-download --without-mpi ${{ matrix.cfg.opts }} --prefix="${HOME}/freefem"

      - name: Build
        run: make -j 3

      - name: Check
        run: |
          make check -i
          ./etc/actions/failed_tests_logs.sh

      - name: Install
        run: make install

  windows:
    strategy:
      fail-fast: false
      matrix:
        cfg:
        - {opts: --enable-optim --enable-generic}

    name: Windows Server 2025 with ${{ matrix.cfg.opts }} - ${{github.workflow}}
    runs-on: windows-2025

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-autotools
            make
            m4
            patch
            git
            flex
            bison
            unzip
            mingw-w64-x86_64-openblas
            mingw-w64-x86_64-gsl
            pkg-config
            pkgfile
            tar
            mingw-w64-x86_64-cmake

      - uses: actions/checkout@v6

      - name: Configure
        run: |
          autoreconf -i
          ./configure --enable-download --disable-superlu --disable-scotch --without-mpi ${{ matrix.cfg.opts }} --prefix="${HOME}/freefem"

      - name: Build
        run: make -j 4

      - name: Check
        run: |
          make check -i
          ./etc/actions/failed_tests_logs.sh
