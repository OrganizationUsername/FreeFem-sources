# Full version of FreeFem, using Microsoft MS-MPI
name: Full version MS-MPI

on:
  push:
    branches:
      - develop
      - master

  pull_request:
    branches:
      - develop

# For development phase
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    strategy:
      fail-fast: false
      matrix:
        cfg:
        - {opts: --enable-optim --enable-generic}

    name: Windows Server 2025 with ${{ matrix.cfg.opts }} - ${{github.workflow}}
    runs-on: windows-2025

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Setup MPI
        uses: mpi4py/setup-mpi@v1
        with:
          mpi: msmpi

      - uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            make
            m4
            patch
            git
            flex
            bison
            unzip
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-openblas
            autoconf
            automake-wrapper
            pkg-config
            pkgfile
            tar
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-msmpi
            python

      # Otherwise PETSc doesn't know which python to use and returns error at
      # configure
      - name: Remove packages
        run: |
          pacman -R --noconfirm mingw-w64-x86_64-python mingw-w64-x86_64-gdb \
          mingw-w64-x86_64-gdb-multiarch

      - uses: actions/checkout@v4

      - name: Extract PETSc and runner info
        id: petsc-info
        run: |
          VERSION=$(grep -E -o "petsc-([0-9]{1,}\.)+[0-9]{1,}" 3rdparty/getall | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image=$ImageOS" >> $GITHUB_OUTPUT
          # Convert MSYS2 path to Windows path
          echo "win_home=$(cygpath -w "$HOME")" >> $GITHUB_OUTPUT

      - name: Cache PETSc installation
        id: cache-petsc
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.petsc-info.outputs.win_home }}/freefem/ff-petsc
          key: petsc-${{ github.workflow }}-${{ steps.petsc-info.outputs.image }}-${{ matrix.cfg.opts }}-${{ steps.petsc-info.outputs.version }}-${{ hashFiles('3rdparty/ff-petsc/Makefile') }}
          
      - name: Configure
        run: |
          autoreconf -i
          ./configure ${{ matrix.cfg.opts }} --enable-download \
          --enable-maintainer-mode \
          --prefix="${HOME}/freefem"

      - name: PETSc
        if: steps.cache-petsc.outputs.cache-hit != 'true'
        run: |
          ./3rdparty/getall -a -o PETSc
          cd 3rdparty/ff-petsc
          make petsc-slepc
          cd -
          ./reconfigure

      - name: Upload PETSc and reconfigure logs on fail
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: PETSc-reconfigure-logs
          path: |
            3rdparty/ff-petsc/petsc-*/configure.log
            config.log
          compression-level: 9

      - name: Build
        run: make -j 4

      - name: Check
        run: |
          make check -i
          ./etc/actions/failed_tests_logs.sh
